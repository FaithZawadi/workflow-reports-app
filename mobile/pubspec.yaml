name: qsl_mobile
description: QSL Maintenance Management — field app (Qalibrated Systems).
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  geolocator: ^12.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# App launcher icon (the QSL emblem). Generate with:
#   flutter pub get
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/brand/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  # Android 8+ adaptive icon: emblem on a white field.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/brand/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/brand/mark.png
    - assets/brand/logo.png
