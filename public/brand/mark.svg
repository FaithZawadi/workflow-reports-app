<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Qalibrated Systems mark">
  <title>Qalibrated Systems</title>
  <defs>
    <clipPath id="qsl-disc"><circle cx="60" cy="60" r="37"/></clipPath>
    <!-- cuts the diagonal gap band out of the emblem so it works on any background -->
    <mask id="qsl-band">
      <rect x="-20" y="-20" width="160" height="160" fill="#fff"/>
      <rect x="-20" y="47" width="160" height="26" fill="#000"/>
    </mask>
  </defs>
  <g transform="rotate(45 60 60)">
    <g mask="url(#qsl-band)">
      <!-- segmented outer ring -->
      <circle cx="60" cy="60" r="47" fill="none" stroke="#131313" stroke-width="11"/>
      <!-- amber disc -->
      <circle cx="60" cy="60" r="37" fill="#F6A81C"/>
      <!-- inner wedges -->
      <g clip-path="url(#qsl-disc)">
        <path d="M 22 47 L 98 47 L 22 30 Z" fill="#131313"/>
        <path d="M 98 73 L 22 73 L 98 90 Z" fill="#131313"/>
      </g>
    </g>
    <!-- black diagonal bar -->
    <rect x="0" y="52" width="120" height="16" fill="#131313"/>
  </g>
</svg>
