<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 220" role="img" aria-label="Qalibrated Systems">
  <defs>
    <clipPath id="qsl-gold"><circle cx="105" cy="95" r="66"/></clipPath>
  </defs>
  <!-- black ring -->
  <circle cx="105" cy="95" r="84" fill="none" stroke="#161310" stroke-width="18"/>
  <!-- white separator + gold disc -->
  <circle cx="105" cy="95" r="73" fill="#F7F5F0"/>
  <circle cx="105" cy="95" r="66" fill="#F5A800"/>
  <!-- crossing stroke divides the gold into pie sectors -->
  <g clip-path="url(#qsl-gold)">
    <line x1="55" y1="150" x2="160" y2="35" stroke="#F7F5F0" stroke-width="24"/>
    <line x1="55" y1="150" x2="160" y2="35" stroke="#161310" stroke-width="15"/>
  </g>
  <!-- primary slash + Q tail extending bottom-right -->
  <line x1="42" y1="30" x2="188" y2="176" stroke="#F7F5F0" stroke-width="34"/>
  <line x1="45" y1="30" x2="196" y2="181" stroke="#161310" stroke-width="24"/>
</svg>
